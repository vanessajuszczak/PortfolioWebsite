# Workflow to build and publish the site to GitHub Pages

name: Deploy to GitHub Pages

# Trigger the workflow on pushes to the main branch
on:
  push:
    branches: 'main'

# Grant minimal permissions needed by the workflow
permissions:
  contents: read       # allow reading repo contents for checkout
  pages: write         # enable publishing to GitHub Pages
  id-token: write      # required for actions/deploy-pages authorisation

jobs:
  # First job builds the static site
  build_site:
    runs-on: ubuntu-latest   # use latest Ubuntu runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # fetch the repository code

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20       # specify Node.js version
          cache: npm             # cache npm dependencies for speed

      - name: Install dependencies
        run: npm install        # install project npm packages

      - name: Build site
        env:
          # BASE_PATH used by build script to set the correct public path
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: npm run build      # execute build command defined in package.json

      - name: Upload build artefacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'build/'        # directory containing the generated site

  # Second job deploys the previously built site to GitHub Pages
  deploy:
    needs: build_site            # ensure build_site completes first
    runs-on: ubuntu-latest       # run on Ubuntu runner as well
    environment:
      name: github-pages         # use the GitHub Pages environment
      url: ${{ steps.deployment.outputs.page_url }}  # output deployment URL
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # official action to publish pages